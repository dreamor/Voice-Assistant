# Voice Assistant 配置文件
# 敏感信息（API Key 等）请放入 .env 文件

# 应用配置
app:
  name: "Voice Assistant"
  version: "2.0.0"

# ASR 配置（语音识别）
asr:
  model: "paraformer-realtime-v2"
  base_url: "https://dashscope.aliyuncs.com/api/v1"
  # 中英文混合识别优化参数
  language_hints: ["zh", "en"]
  disfluency_removal_enabled: true  # 过滤语气词（嗯、啊等）
  max_sentence_silence: 1200  # 句间停顿容忍时间（毫秒）
  # 热词配置
  hotwords:
    enabled: true
    config_file: "config/hotwords.json"
    vocabulary_id: null  # 运行时自动创建/更新

# LLM 配置（AI 对话）
llm:
  model: "kimi-k2.5"
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  max_tokens: 2000
  temperature: 0.7
  # 本地模型切换
  use_local: false  # true 使用本地模型，false 使用在线 API
  local:
    model_path: "model_weights/gemma-4-E2B-it.litertlm"
    model_name: "gemma-4-E2B-it"
    system_prompt: "你是一个友好的中文语音助手，回复要简洁口语化，适合语音播放。"
    use_multimodal_audio: true  # true=直接将音频送给 Gemma 4 多模态模型，false=先用 ASR 转文本再送 LLM

# 音频配置
audio:
  sample_rate: 16000  # 标准 ASR 采样率，提升识别准确率
  edge_tts_voice: "zh-CN-XiaoxiaoNeural"

# VAD 配置
vad:
  threshold: 0.02
  silence_timeout: 1.5
  min_speech: 0.3
  wait_timeout: 10
  max_recording: 30

# Open Interpreter 配置
interpreter:
  auto_run: true
  verbose: false

# 对话历史配置
history:
  max_turns: 20

# 日志配置
logging:
  level: "INFO"
  format: "%(asctime)s - %(levelname)s - %(message)s"